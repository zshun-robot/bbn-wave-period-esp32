;PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ============================================================
; M5Stack AtomS3 (内置 MPU6886 IMU) - 主目标板
; ============================================================
[env:m5stack-atoms3]
platform = espressif32
board = m5stack-atoms3
framework = arduino

; Serial Monitor options
monitor_speed = 115200
monitor_filters =
    default
    time

; Build options
build_flags =
    -DARDUINO_M5STACK_ATOMS3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DBOSCH_BMI270_DISABLED
    -funroll-loops
    -fno-finite-math-only

; Library dependencies
; 参考 .github/workflows/build.yaml 中的 required-libraries 字段
lib_deps =
    m5stack/M5Unified@^0.2.13
    hideakitai/ArduinoEigen@^0.3.2

; 排除 AtomS3R (Bosch BMI270) 的独立 .cpp 文件（.h 文件无需排除，它们不自动编译）
; ImuCalWizardRunner.cpp 是 AtomS3R 专用，主程序 bbn_wave_freq_m5atomS3.cpp 不引用它
build_src_filter =
    +<*>
    -<ImuCalWizardRunner.cpp>

; Extra scripts - 固件合并脚本
extra_scripts =
    post:merge_firmware.py

